name: Python Tests

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  python-tests:
    name: 🐍 Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
          - windows-11-arm
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: 🛒 checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ⚙️ install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: 🏗️ install package and test dependencies
        run: uv sync --extra dev

      - name: 🧪 run pytest
        run: uv run pytest -v
